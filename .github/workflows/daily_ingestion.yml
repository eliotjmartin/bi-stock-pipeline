name: Daily Stock Ingestion

on:
  schedule:
    # runs at 21:30 utc (4:30pm est) monday-friday
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # allow manual testing

jobs:
  ingest_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pandas pandas-gbq google-cloud-bigquery requests

      - name: Run Ingestion Script
        env:
          # map github secrets to environment variables
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python extract_alpha_vantage.py